<!DOCTYPE html>
<html>

<head>
<title>Your Resume</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>

<h1 style="text-align:center">Your Resume</h1>

<div id="loading" style="text-align:center">
Generating Resume...
</div>

<div id="output" class="resume-wrapper" style="display:none"></div>

<br>

<div style="text-align:center">
<button onclick="downloadPDF()" id="pdfBtn" disabled>Download PDF</button>
<button onclick="downloadWord()" id="docBtn" disabled>Download Word</button>
</div>


<script>

async function generate(){

let data = JSON.parse(localStorage.getItem("resumeForm"))

let res = await fetch("https://resume-ai-api-tg2p.onrender.com/generate-resume",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

let result = await res.json()

document.getElementById("output").innerHTML = result.resume

document.getElementById("output").style.display="block"
document.getElementById("loading").style.display="none"

document.getElementById("pdfBtn").disabled=false
document.getElementById("docBtn").disabled=false

}

generate()


function downloadPDF(){

html2pdf().from(document.getElementById("output")).save("resume.pdf")

}


function downloadWord(){

let content = document.getElementById("output").innerHTML

let blob = new Blob(['<html><body>'+content+'</body></html>'], {type:'application/msword'})

let a = document.createElement("a")
a.href = URL.createObjectURL(blob)
a.download = "resume.doc"
a.click()

}

</script>

</body>
</html>
