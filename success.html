<!DOCTYPE html>
<html>

<head>

<title>Your Resume</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>Your Resume</h1>

</header>

<div style="max-width:900px;margin:auto">

<div id="resumeOutput">

Generating resume...

</div>

</div>

<script>

async function generateResume(){

let data = JSON.parse(localStorage.getItem("resumeForm"))

let response = await fetch("https://resume-ai-api-tg2p.onrender.com/generate-resume",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(data)

})

let result = await response.json()

document.getElementById("resumeOutput").innerHTML = result.resume

}

generateResume()

</script>

</body>

</html>
