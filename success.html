<!DOCTYPE html>
<html>
<head>
<title>Generating Resume</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
<div class="card">
<h2 id="loading">Generating AI Resume...</h2>
</div>
</div>

<script>

if (!localStorage.getItem("resumeData")) {
alert("Session expired");
window.location.href = "index.html";
}

let dots = 0;
setInterval(()=>{
dots=(dots+1)%4;
document.getElementById("loading").innerText =
"Generating AI Resume" + ".".repeat(dots);
},500);

async function generate(){

try{

const data = JSON.parse(localStorage.getItem("resumeData"));

const res = await fetch("https://resume-ai-api-tg2p.onrender.com/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

const result = await res.json();

if(!result.success || !result.html) throw new Error();

localStorage.setItem("resumeOutput", result.html);

window.location.href="download.html";

}catch{

window.location.href="fallback.html";

}

}

generate();

</script>

</body>
</html>
