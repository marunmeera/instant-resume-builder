<!DOCTYPE html>
<html>
<head>
<title>Generating Resume</title>
<link rel="stylesheet" href="style.css">
<script src="resume-template.js"></script>
</head>

<body>

<div class="container">
<div class="card">
<h2 id="loading">Generating Resume...</h2>
</div>
</div>

<script>

if (!localStorage.getItem("resumeData")) {
alert("Session expired");
window.location.href = "index.html";
}

let dots = 0;
setInterval(()=>{
dots=(dots+1)%4;
document.getElementById("loading").innerText = "Generating Resume" + ".".repeat(dots);
},500);

const data = JSON.parse(localStorage.getItem("resumeData"));

const html = generateResumeHTML(data);

localStorage.setItem("resumeOutput", html);

setTimeout(()=>{
window.location.href="download.html";
},1000);

</script>

</body>
</html>
