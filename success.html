<!DOCTYPE html>
<html>

<head>

<title>Resume Ready</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>Your Resume Request Received</h1>

</header>

<div style="max-width:800px;margin:auto">

<pre id="resumeOutput"></pre>

</div>

<script>

let data = JSON.parse(localStorage.getItem("resumeForm"))

document.getElementById("resumeOutput").innerText =

"Thank you "+data.name+
"\n\nYour resume is being prepared and will be sent to "+data.email

</script>

</body>

</html>
