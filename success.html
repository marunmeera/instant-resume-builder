<!DOCTYPE html>
<html>

<head>
<title>Generating Resume</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
<div class="card">

<h2 id="loadingText">Generating Resume</h2>
<p>Please wait...</p>

</div>
</div>

<script>

if (!localStorage.getItem("resumeData")) {
alert("Session expired");
window.location.href = "index.html";
}

// ANIMATION
let dots = 0;
setInterval(() => {
dots = (dots + 1) % 4;
document.getElementById("loadingText").innerText = "Generating Resume" + ".".repeat(dots);
}, 500);

async function generate(){

try {

const data = JSON.parse(localStorage.getItem("resumeData"));

const res = await fetch("https://resume-ai-api-tg2p.onrender.com/generate", {
method: "POST",
headers: {"Content-Type":"application/json"},
body: JSON.stringify(data)
});

const result = await res.json();

if (!result || !result.resume) {
throw new Error("Invalid API response");
}

localStorage.setItem("resumeOutput", result.resume);

window.location.replace("download.html");

} catch (err) {

alert("Error generating resume. Try again.");
window.location.href = "index.html";

}

}

generate();

</script>

</body>
</html>
