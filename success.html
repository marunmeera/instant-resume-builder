<!DOCTYPE html>
<html>

<head>

<title>Your Resume</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>

<body>

<header>

<h1>Your Resume</h1>

</header>


<div class="resume-wrapper">

<div id="resumeOutput">

Generating resume...

</div>

</div>


<br>

<button onclick="downloadPDF()" class="btn19">
Download PDF
</button>

<button onclick="downloadWord()" class="btn29">
Download Word
</button>


<script>

if(!localStorage.getItem("paymentAllowed")){

document.body.innerHTML="Unauthorized Access"

throw new Error("Blocked")

}

async function generateResume(){

let data=JSON.parse(localStorage.getItem("resumeForm"))

let response=await fetch("https://resume-ai-api-tg2p.onrender.com/generate-resume",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify(data)

})

let result=await response.json()

document.getElementById("resumeOutput").innerHTML=result.resume

}

generateResume()


function downloadPDF(){

let element=document.getElementById("resumeOutput")

html2pdf().from(element).save("resume.pdf")

}


function downloadWord(){

let content=document.getElementById("resumeOutput").innerHTML

let blob=new Blob(['<html><body>'+content+'</body></html>'],{

type:"application/msword"

})

let link=document.createElement("a")

link.href=URL.createObjectURL(blob)

link.download="resume.doc"

link.click()

}

</script>

</body>

</html>
