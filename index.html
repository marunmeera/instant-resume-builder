<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instant Resume Builder</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Instant Resume Builder</h1>
<p>Create professional resumes in minutes</p>

<div class="badges">
<span>ATS Friendly</span>
<span>AI Powered</span>
<span>Instant Download</span>
</div>

</header>


<div class="announcement">
Next Updates: Handwritten Resume (+₹10) | Resume Score & Improvements (₹19)
</div>


<div class="container">

<div class="card">

<h2>Generate Resume</h2>

<label>Full Name</label>
<input id="name">

<label>Mobile</label>
<input id="mobile">

<label>Email</label>
<input id="email">


<h3>Academics (Recent First)</h3>

<div id="academics">

<input placeholder="Qualification">
<input placeholder="Institution">
<input placeholder="Grade">

</div>

<button class="add-btn" onclick="addAcademic()">
+ Add Academic
</button>


<h3>Certifications</h3>

<textarea id="certifications"></textarea>


<h3>Work Experience (Recent First)</h3>

<div id="experience">

<input placeholder="Company">
<input placeholder="Role">
<textarea placeholder="Description"></textarea>

</div>

<button class="add-btn" onclick="addExperience()">
+ Add Experience
</button>


<h3>Skills</h3>
<textarea id="skills"></textarea>

<h3>Projects</h3>
<textarea id="projects"></textarea>


<br><br>

<button class="btn19" onclick="payPDF()">
Generate Resume PDF ₹19
</button>

<button class="btn29" onclick="payEditable()">
Editable Resume ₹29
</button>

</div>

</div>

<script src="resume-generator.js"></script>

</body>
</html>
