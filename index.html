<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instant Resume Builder</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="hero">
<h1>Build a Job-Winning Resume in 2 Minutes</h1>
<p>ATS-friendly | No design skills needed | Instant download</p>
</div>

<div class="container">
<div class="card">

<label>Full Name</label>
<input id="name">

<label>Mobile</label>
<input id="mobile">

<label>Email</label>
<input id="email">

<h3>Academics <button onclick="addAcademic()" class="add-btn">+</button></h3>
<div id="academics"></div>

<h3>Work Experience <button onclick="addExperience()" class="add-btn">+</button></h3>
<div id="experience"></div>

<h3>Skills <button onclick="addSkill()" class="add-btn">+</button></h3>
<div id="skillsSection"></div>

<h3>Projects</h3>
<textarea id="projects"></textarea>

<br>

<div onclick="preparePayment()">
<form>
<script src="https://checkout.razorpay.com/v1/payment-button.js"
data-payment_button_id="pl_SZKlB7ME0Iami0"
async>
</script>
</form>
</div>

</div>
</div>

<script src="resume-generator.js"></script>

</body>
</html>
