<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Instant Resume Builder</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>Instant Resume Builder</h1>

<p>Create professional resumes in minutes</p>

</header>


<div class="container">

<!-- Resume Generator -->

<div class="section">

<div class="card">

<h2>Generate Resume</h2>

<label>Full Name</label>
<input id="name" placeholder="Enter your full name">

<label>Mobile</label>
<input id="mobile" placeholder="Enter mobile number">

<label>Email</label>
<input id="email" placeholder="Enter email address">

<h3>Certifications</h3>

<textarea id="certifications" placeholder="List your certifications"></textarea>

<br><br>

<button class="btn19" onclick="payPDF()">
Generate PDF Resume ₹19
</button>

<button class="btn29" onclick="payEditable()">
Editable Resume ₹29
</button>

</div>

</div>


<!-- Resume Score -->

<div class="section">

<div class="card">

<h2>Resume Score</h2>

<textarea placeholder="Paste your resume here to analyze"></textarea>

<p style="font-size:13px;color:#555">
AI scoring feature coming soon
</p>

</div>

</div>

</div>


<!-- Load script at bottom so DOM exists -->

<script src="resume-generator.js"></script>

</body>

</html>
