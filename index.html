<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instant Resume Builder</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Instant Resume Builder</h1>
<p>Create a job-winning resume in 2 minutes</p>
</header>

<div class="container">
<div class="card">

<label>Full Name</label>
<input id="name">

<label>Mobile</label>
<input id="mobile">

<label>Email</label>
<input id="email">

<!-- ACADEMICS -->
<h3>+ Academics (Latest First) <button onclick="addAcademic()">+</button></h3>
<div id="academics"></div>

<!-- EXPERIENCE -->
<h3>+ Work Experience (Latest First) <button onclick="addExperience()">+</button></h3>
<div id="experience"></div>

<!-- SKILLS -->
<h3>+ Skills <button onclick="addSkill()">+</button></h3>
<div id="skillsSection"></div>

<!-- PROJECTS -->
<h3>Projects</h3>
<textarea id="projects" placeholder="Enter the list of projects per line you completed in school, college, etc."></textarea>

<!-- CUSTOM -->
<h3>+ Create Own Section <button onclick="addCustom()">+</button></h3>
<div id="customSection"></div>

<br>

<div onclick="preparePayment()">
<form>
<script src="https://checkout.razorpay.com/v1/payment-button.js"
data-payment_button_id="pl_SZKlB7ME0Iami0"
async>
</script>
</form>
</div>

</div>
</div>

<script src="resume-generator.js"></script>

</body>
</html>
