<!DOCTYPE html>
<html>

<head>

<title>Instant Resume Builder</title>

<link rel="stylesheet" href="style.css">

<script src="resume-generator.js"></script>

</head>

<body>

<header>

<h1>Instant Resume Builder</h1>

<p>Create professional resumes in minutes</p>

</header>


<div class="container">

<div class="section">

<div class="card">

<h2>Generate Resume</h2>

<label>Full Name</label>
<input id="name">

<label>Mobile</label>
<input id="mobile">

<label>Email</label>
<input id="email">

<h3>Certifications</h3>

<textarea id="certifications"></textarea>

<br><br>

<button class="btn19" onclick="payPDF()">
PDF Resume ₹19
</button>

<button class="btn29" onclick="payEditable()">
Editable Resume ₹29
</button>

</div>

</div>


<div class="section">

<div class="card">

<h2>Resume Score</h2>

<textarea placeholder="Paste resume here"></textarea>

</div>

</div>

</div>

</body>

</html>
