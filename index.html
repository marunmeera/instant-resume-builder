<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Instant Resume Builder</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>Instant Resume Builder</h1>

<p>Create professional resumes in minutes</p>

</header>


<div class="announcement">

<strong>Upcoming Features:</strong>

<span class="highlight1">
Handwritten Resume Generation (+₹10)
</span>

|

<span class="highlight2">
Upload Resume → AI Score & Improvement Suggestions (From ₹19)
</span>

</div>


<div class="container">

<div class="card">

<h2>Generate Resume</h2>

<label>Full Name</label>
<input id="name" placeholder="Enter your full name">

<label>Mobile</label>
<input id="mobile" placeholder="Enter mobile number">

<label>Email</label>
<input id="email" placeholder="Enter email address">

<label>LinkedIn (Optional)</label>
<input id="linkedin">

<label>Location (Optional)</label>
<input id="location">

<h3>Professional Summary (Optional)</h3>
<textarea id="summary"></textarea>

<h3>Skills</h3>
<textarea id="skills"></textarea>

<h3>Certifications</h3>
<textarea id="certifications"></textarea>

<h3>Projects</h3>
<textarea id="projects"></textarea>

<br><br>

<button class="btn19" onclick="payPDF()">
Generate PDF Resume ₹19
</button>

<button class="btn29" onclick="payEditable()">
Editable Resume ₹29
</button>

</div>

</div>

<script src="resume-generator.js"></script>

</body>

</html>
