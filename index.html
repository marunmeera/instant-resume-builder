<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instant Resume Builder (20:30)</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Instant Resume Builder</h1>
<p>Create professional resumes in minutes</p>
</header>

<div class="container">

<div class="card">

<h2>Generate Resume</h2>

<label>Full Name</label>
<input id="name">

<label>Mobile</label>
<input id="mobile">

<label>Email</label>
<input id="email">


<h3>Academics (Recent First)</h3>

<div id="education">

<div class="edu-block">
<input placeholder="Qualification">
<input placeholder="Institution">
<input placeholder="Grade">
</div>

</div>

<button onclick="addEducation()">+ Add Academic</button>


<h3>Work Experience (Recent First)</h3>

<div id="experience">

<div class="exp-block">
<input placeholder="Company">
<input placeholder="Role">
<textarea placeholder="Description"></textarea>
</div>

</div>

<button onclick="addExperience()">+ Add Experience</button>


<h3>Skills</h3>
<textarea id="skills"></textarea>

<h3>Certifications</h3>
<textarea id="certifications"></textarea>

<h3>Projects</h3>
<textarea id="projects"></textarea>


<br><br>

<button onclick="payPDF()">Generate PDF ₹19</button>
<button onclick="payEditable()">Editable ₹29</button>

</div>

</div>

<script src="resume-generator.js"></script>

</body>
</html>
