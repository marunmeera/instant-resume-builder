<!DOCTYPE html>
<html>

<head>

<title>Instant Resume Builder</title>

<link rel="stylesheet" href="style.css">

<script src="resume-generator.js"></script>

</head>

<body>

<header>

<h1>Instant Resume Builder</h1>

<p>Create professional resumes in minutes</p>

</header>


<div class="container">

<!-- LEFT SECTION -->

<div class="section">

<div class="card">

<h2>Generate Resume</h2>

<label>Full Name</label>
<input id="name">

<label>Mobile Number</label>
<input id="mobile">

<label>Email</label>
<input id="email">


<h3>Academics</h3>

<div id="academics">

<input placeholder="Qualification">
<input placeholder="Institution">
<input placeholder="Grade">

</div>

<button class="add-btn" onclick="addAcademic()">
Add Academic
</button>


<h3>Certifications</h3>

<textarea id="certifications"></textarea>


<h3>Work Experience</h3>

<div id="experience">

<input placeholder="Company">
<input placeholder="Role">
<textarea placeholder="Description"></textarea>

</div>

<button class="add-btn" onclick="addExperience()">
Add Experience
</button>


<br><br>

<button class="btn19" onclick="payPDF()">
Generate PDF Resume ₹19
</button>

<button class="btn29" onclick="payEditable()">
Editable Resume ₹29
</button>

</div>

</div>


<!-- RIGHT SECTION -->

<div class="section">

<div class="card">

<h2>Score Your Resume</h2>

<textarea id="resumeText" placeholder="Paste resume text here"></textarea>

<br>

<button class="btn19">
5 Improvements ₹19
</button>

<button class="btn29">
10 Improvements ₹29
</button>

</div>

</div>

</div>

</body>

</html>
