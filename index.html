<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Instant Resume Builder</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>Instant Resume Builder</h1>

<p>Create professional resumes in minutes</p>

</header>


<!-- Announcement Banner -->

<div class="announcement">

<div class="ticker">

<strong>Upcoming Features:</strong>

&nbsp;&nbsp;

Generate Resume from Handwritten Inputs (+₹10)

&nbsp;&nbsp; | &nbsp;&nbsp;

Upload Resume → AI Resume Score & Improvement Suggestions (Starting ₹19)

</div>

</div>


<div class="container">

<div class="card">

<h2>Generate Resume</h2>

<label>Full Name</label>
<input id="name" placeholder="Enter your full name">

<label>Mobile</label>
<input id="mobile" placeholder="Enter mobile number">

<label>Email</label>
<input id="email" placeholder="Enter email address">


<h3>Academics</h3>

<div id="academics">

<input placeholder="Qualification (SSLC / HSC / Degree)">
<input placeholder="Institution Name">
<input placeholder="Grade / Percentage">

</div>

<button class="add-btn" onclick="addAcademic()">
+ Add Academic
</button>


<h3>Certifications</h3>

<textarea id="certifications" placeholder="List certifications"></textarea>


<h3>Work Experience</h3>

<div id="experience">

<input placeholder="Company Name">
<input placeholder="Role">
<textarea placeholder="Description"></textarea>

</div>

<button class="add-btn" onclick="addExperience()">
+ Add Experience
</button>


<h3>Skills</h3>

<textarea id="skills" placeholder="List your skills"></textarea>


<h3>Projects</h3>

<textarea id="projects" placeholder="Describe key projects"></textarea>


<br><br>

<button class="btn19" onclick="payPDF()">
Generate Resume PDF ₹19
</button>

<button class="btn29" onclick="payEditable()">
Editable Resume ₹29
</button>

</div>

</div>


<script src="resume-generator.js"></script>

</body>

</html>
